services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: notepad
      DB_PASSWORD: notepad_password
      DB_NAME: notepad
      JWT_SECRET: change-this-secret
      JWT_EXPIRES_IN: 1d
      ADMIN_EMAILS: admin@example.com
      SIGNUP_ENABLED: "true"
      NUXT_PUBLIC_API_BASE: http://localhost:3000
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: notepad
      MYSQL_USER: notepad
      MYSQL_PASSWORD: notepad_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
